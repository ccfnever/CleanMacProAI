$schema = "../../schemas/desktop-schema.json"
identifier = "default"
description = "CleanMacProAI 默认权限配置"

[permissions]

# ── 文件系统权限 ──
"fs:allow-read-file" = true
"fs:allow-read-dir" = true
"fs:allow-write-file" = true
"fs:allow-mkdir" = true
"fs:allow-remove" = true

# 允许读取的目录
"fs:scope" = [
  "$HOME/**",
  "$HOME/Library/Caches/**",
  "$HOME/Library/Logs/**",
  "$HOME/Downloads/**",
  "$HOME/.Trash/**",
  "$HOME/Library/Developer/**",
  "/Library/Caches/**",
  "/Library/Logs/**",
]

# ── Shell 权限（用于 Docker、tmutil 等命令）───
"shell:allow-spawn" = true
"shell:allow-open" = true
"shell:allow-kill" = true

# ── macOS 权限（Full Disk Access 检查）───
"macos-permissions:allow-check" = true
"macos-permissions:allow-request" = true
